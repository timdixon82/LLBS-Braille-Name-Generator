# Continuous integration: lint the LLBS Braille Name Generator static front-end.
#
# Stack: HTML, CSS, and JavaScript served directly from the repo root.
# No build step. Tools: html-validate, Stylelint, ESLint.
#
# No untrusted GitHub event input (issue title, PR title, commit message,
# branch name, etc.) is used in any run: step, so this workflow is not
# exposed to command-injection through event data.
#
# Action versions were verified against GitHub and pinned to commit SHAs
# on 2026-05-21. The version tag is in the trailing comment. To update an
# action, change the SHA and the comment together.

name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint HTML, CSS, and JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint JavaScript
        run: npm run lint:js

      # Automated tests: tests/accessibility/ is scaffolded but currently empty.
      # Uncomment and adapt this step when a test runner is configured.
      # - name: Run tests
      #   run: npm test
