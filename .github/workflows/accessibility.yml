# Accessibility checks at WCAG 2.2 AAA using Pa11y and axe-core.
#
# Runs on every pull request. Serves the project locally on port 8080 with
# Python's built-in HTTP server, installs Pa11y and axe-core CLI plus
# wait-on and browser-driver-manager, and runs both tools against index.html.
#
# Two well-known GitHub Actions runner issues are handled here:
#
#   1. Pa11y, via Puppeteer, needs no-sandbox because the runner
#      disables unprivileged user namespaces. Pa11y picks up the
#      pa11y.json file in the repository root, whose
#      chromeLaunchConfig.args sets no-sandbox and
#      disable-setuid-sandbox.
#
#   2. The axe-core CLI uses ChromeDriver via Selenium. The runner has
#      a specific Chrome version; we install a matching ChromeDriver
#      via browser-driver-manager before running axe. The
#      chrome-options=no-sandbox argument passes through to the
#      Chrome process the driver launches.
#
# Security note: no untrusted GitHub context variables are used in any
# run step. All run commands are fixed strings.
#
# Action versions are pinned to commit SHAs verified on 2026-05-23.

name: Accessibility
on:
  pull_request:

permissions:
  contents: read

jobs:
  accessibility:
    name: Pa11y and axe at WCAG 2.2 AAA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*

      - name: Install accessibility tools
        run: npm install -g pa11y@9.1.1 @axe-core/cli@4.11.3 wait-on@8.0.1 browser-driver-manager@2.0.1

      - name: Install matching Chrome and ChromeDriver
        run: npx browser-driver-manager install chrome

      - name: Serve the site in the background
        run: python3 -m http.server 8080 &

      - name: Wait for the server to be ready
        run: npx wait-on http://localhost:8080 --timeout 15000

      - name: Pa11y on index.html at WCAG 2.2 AAA
        run: pa11y --standard WCAG2AAA http://localhost:8080/index.html

      - name: axe-core on index.html at WCAG 2.2 AAA
        run: axe http://localhost:8080/index.html --tags wcag2a,wcag2aa,wcag2aaa,wcag22aa,wcag22aaa --chrome-options=no-sandbox
