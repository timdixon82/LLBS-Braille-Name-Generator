# Deploy to GitHub Pages.
# Runs on every push to main and on manual dispatch.
#
# THIS IS THE TEAM STANDARD for deploying a static site to GitHub Pages.
# See docs/patterns/github-pages-deploy.md in the team wiki for the full standard.
#
# Activation (one-time, per repo): GitHub > Settings > Pages > Build and
# deployment > Source > "GitHub Actions" (NOT "Deploy from a branch").
# This repo is confirmed active: Tim Dixon confirmed the Pages source is set
# to "GitHub Actions" on 2026-05-30.
#
# LLBS Braille Name Generator is an UNBUNDLED static project: HTML, CSS, and
# JavaScript are served directly from the repo root with no build step.
# The "Assemble site" step copies runtime files into _site, excluding
# node_modules, .github, docs, and config files.
#
# Action SHAs are pinned to full 40-character commit SHAs.
# Never use a shortened SHA: GitHub no longer resolves them and the deploy
# will fail. Update SHAs via Dependabot.
#
# Action versions were verified against GitHub and pinned to commit SHAs
# on 2026-05-21. The version tag is in the trailing comment.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. In-progress deploy is cancelled if a new push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Assemble site
        run: |
          mkdir _site
          rsync -av \
            --exclude='_site' \
            --exclude='node_modules' \
            --exclude='.github' \
            --exclude='.git' \
            --exclude='.claude' \
            --exclude='docs' \
            --exclude='tests' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='eslint.config.js' \
            --exclude='.stylelintrc.json' \
            --exclude='.htmlvalidate.json' \
            --exclude='pa11y.json' \
            --exclude='pa11y.ci.json' \
            --exclude='release-please-config.json' \
            --exclude='.release-please-manifest.json' \
            --exclude='CLAUDE.md' \
            --exclude='.editorconfig' \
            --exclude='.gitignore' \
            --exclude='todo.md' \
            . _site/

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
